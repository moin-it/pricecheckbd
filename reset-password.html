<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reset Password — Check Price BD</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap');
  :root{
    --bg:#f7f9fb; --card:#ffffff; --border:#e3e8ed; --text:#1a2433; --text-dim:#6b7785;
    --blue:#1d5fd6; --green:#1c8a4a; --orange:#f5821f; --price-up:#e0453c;
    --font-display:'Manrope', 'Noto Sans Bengali', sans-serif;
    --font-body:'Inter', 'Noto Sans Bengali', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  [lang-bn]{display:none;}
  body.bn [lang-en]{display:none;}
  body.bn [lang-bn]{display:inline;}
  body.bn{font-family:'Noto Sans Bengali', var(--font-body);}
  .box{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:32px 28px; max-width:380px; width:100%; box-shadow:0 4px 14px rgba(20,30,45,.08);}
  .brand-name{font-family:var(--font-display); font-weight:800; font-size:20px; text-align:center; margin-bottom:6px;}
  .brand-name .bn-check{color:var(--blue);} .brand-name .bn-price{color:var(--green);}
  .brand-name .bn-bd{background:var(--orange); color:#fff; font-size:12px; padding:1px 6px; border-radius:5px;}
  h2{font-size:18px; margin:16px 0 14px; text-align:center; font-family:var(--font-display);}
  .field{margin-bottom:14px;}
  .field label{font-size:13px; color:var(--text-dim); display:block; margin-bottom:6px; font-weight:600;}
  .field input{width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:11px 12px; border-radius:9px; font-size:14px; outline:none;}
  .field input:focus{border-color:var(--green);}
  .btn{background:var(--green); color:#fff; border:none; padding:12px 20px; border-radius:10px; font-weight:700; cursor:pointer; font-size:14px; width:100%; font-family:var(--font-display);}
  .error-msg{color:var(--price-up); font-size:13px; margin-top:10px; text-align:center;}
  .success-msg{color:var(--green); font-size:13px; margin-top:10px; text-align:center;}
  .back-link{display:block; text-align:center; margin-top:16px; font-size:13px; color:var(--text-dim); font-weight:600; text-decoration:none;}
</style>
</head>
<body>

<div class="box">
  <div class="brand-name"><span class="bn-check">check</span><span class="bn-price">price</span><span class="bn-bd">bd</span></div>

  <div id="formBox">
    <h2>🔑 <span lang-en>Set a New Password</span><span lang-bn>নতুন পাসওয়ার্ড সেট করুন</span></h2>
    <div class="field">
      <label><span lang-en>New Password</span><span lang-bn>নতুন পাসওয়ার্ড</span></label>
      <input type="password" id="newPassword" placeholder="At least 6 characters">
    </div>
    <div class="field">
      <label><span lang-en>Confirm Password</span><span lang-bn>পাসওয়ার্ড নিশ্চিত করুন</span></label>
      <input type="password" id="confirmPassword" placeholder="••••••••">
    </div>
    <button class="btn" onclick="submitNewPassword()"><span lang-en>Update Password</span><span lang-bn>পাসওয়ার্ড আপডেট করুন</span></button>
    <div id="resultMsg"></div>
  </div>

  <a class="back-link" href="index.html?view=account">← <span lang-en>Back to Log In</span><span lang-bn>লগইনে ফিরে যান</span></a>
</div>

<script>
const SUPABASE_URL = 'https://kkngaalkvillmgvhakld.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrbmdhYWxrdmlsbG1ndmhha2xkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NTgyMDUsImV4cCI6MjA5NzUzNDIwNX0.Xucfdn3NKCcoj46JtyAzzMuISL5BW8LoWBq6blBPCHI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function getToken(){
  return new URLSearchParams(window.location.search).get('token');
}

const token = getToken();
if(!token){
  document.getElementById('formBox').innerHTML = `
    <h2>⚠️ <span lang-en>Invalid Link</span><span lang-bn>অবৈধ লিংক</span></h2>
    <p style="text-align:center; color:var(--text-dim); font-size:13px;">
      <span lang-en>This password reset link is missing a token. Please request a new one.</span>
      <span lang-bn>এই লিংকে টোকেন নেই। নতুন রিসেট লিংক চেয়ে নিন।</span>
    </p>`;
}

async function submitNewPassword(){
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const msgEl = document.getElementById('resultMsg');
  msgEl.innerHTML = '';

  if(!password || password.length < 6){
    msgEl.innerHTML = '<div class="error-msg">Password must be at least 6 characters</div>';
    return;
  }
  if(password !== confirm){
    msgEl.innerHTML = '<div class="error-msg">Passwords do not match</div>';
    return;
  }

  const { data, error } = await sb.rpc('reset_password_with_token', { p_token: token, p_new_password: password });
  if(error){
    msgEl.innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
    return;
  }
  if(!data){
    msgEl.innerHTML = '<div class="error-msg">This link is invalid or has expired. Please request a new one.</div>';
    return;
  }
  document.getElementById('formBox').innerHTML = `
    <h2>✅ <span lang-en>Password Updated</span><span lang-bn>পাসওয়ার্ড আপডেট হয়েছে</span></h2>
    <p style="text-align:center; color:var(--text-dim); font-size:13px;">
      <span lang-en>Your password has been changed. You can now log in with your new password.</span>
      <span lang-bn>আপনার পাসওয়ার্ড পরিবর্তন হয়ে গেছে। এখন নতুন পাসওয়ার্ড দিয়ে লগইন করতে পারবেন।</span>
    </p>`;
}
</script>
</body>
</html>
